name: Daily HK Volume Screener

on:
  schedule:
    # Mon–Fri at 09:15 UTC (17:15 HKT) — allows Yahoo EOD data to settle.
    - cron: "15 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screen:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run EOD volume screener
        run: python main.py

      - name: Render Table to GitHub UI Summary
        if: always()
        run: |
          if [ -f github_summary.md ]; then
            cat github_summary.md >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⚠️ Error: github_summary.md was not generated by the python execution loop." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Send Daily Alert Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: 465
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: 📊 HKEX Daily Volume Anomalies Report
          to: ${{ secrets.RECEIVER_EMAIL }}
          from: HKEX Stock Bot <${{ secrets.SMTP_USER }}>
          secure: true
          convert_markdown: true
          html_body: file://github_summary.md

      - name: Commit daily report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -z "$(git status --porcelain reports/ README.md)" ]; then
            echo "No new, changed, or deleted reports/README to commit."
            exit 0
          fi

          git add reports/ README.md
          git commit -m "chore: update HK volume screener reports $(date -u +%Y-%m-%d)"
          git push
